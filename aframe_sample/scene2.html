<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>白山キャンパス360</title>
        <!-- A-Frameの読み込み -->
        <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
        <script src="js/vr-link.js"></script>
    </head>
    <body>
        <!-- シーン -->
        <a-scene>
            <!-- 360度画像 -->
            <a-sky src="360pic/360picture2.jpg" rotation="-2 -80 10"></a-sky>
            <!-- シーン1への遷移アイコン -->
            <a-image src="icon/arrow.png" width="1.5" height="1.5" rotation="-70 175 0" position="-2 -1.7 10" scene-link="link: scene1.html?from=scene2"></a-image>
            <!-- カメラとカーソルの追加 -->
            <a-entity camera look-controls cursor="rayOrigin: mouse; fuse: false"></a-entity>
        </a-scene>
    </body>
</html>
